# PostgreSQL datasource (used when running with Docker)
spring.datasource.url=jdbc:postgresql://postgres:5432/librarydb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=library_user
spring.datasource.password=library_pass

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html

# Kafka (docker — connects to kafka container via internal Docker network)
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=library-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.librarycatalog.kafka
